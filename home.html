<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100dvh;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  overflow:hidden;
}

/* 📱 TELEFONO */
.phone{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.25);

  width:min(420px, 90vw);
  aspect-ratio:9/16;

  overflow:hidden;
  background:url("Untitled homexcreen.jpg") center/cover no-repeat;
  color:white;
}

/* overlay profundidad */
.phone::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(255,255,255,0.08),
    rgba(0,0,0,0.05),
    rgba(0,0,0,0.35)
  );
  pointer-events:none;
}

/* GRID */
.apps{
  position:absolute;
  top:90px;
  width:100%;

  display:grid;
  grid-template-columns:repeat(4,1fr);

  justify-items:center;
  row-gap:45px;
}

/* APP */
.app{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-decoration:none;
  color:white;
  font-size:13px;
  font-weight:500;

  text-shadow:
    0 1px 1px rgba(0,0,0,0.9),
    0 -1px 0 rgba(255,255,255,0.2);
}

/* ICONO BASE */
.app img{
  width:90px;
  height:90px;
  border-radius:22%;
  position:relative;

  /* 🔥 SOMBRA REAL IOS */
  box-shadow:
    0 10px 25px rgba(0,0,0,0.65),
    inset 0 2px 4px rgba(255,255,255,0.7),
    inset 0 -4px 8px rgba(0,0,0,0.35);

  transition:.15s ease;
}

/* ✨ BRILLO iOS 6 */
.app img::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:50%;
  border-radius:22%;

  background:linear-gradient(
    to bottom,
    rgba(255,255,255,0.7),
    rgba(255,255,255,0.15),
    transparent
  );

  pointer-events:none;
}

/* 💥 CLICK MÁS REAL */
.app:active img{
  transform:scale(0.82);
  filter:brightness(1.15);
}

/* 🧊 EFECTO VIDRIO SUAVE (DEPTH) */
.app{
  backdrop-filter: blur(1px);
}

/* 📱 MOBILE EXACTO */
@media (max-width:768px){
  .phone{
    width:100vw;
    height:100dvh;
    aspect-ratio:auto;

    top:0;
    left:0;
    transform:none;
  }
}
</style>
