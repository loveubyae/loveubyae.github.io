<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>loveubyae</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100dvh;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;

  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Text",
    "Helvetica Neue",
    Helvetica,
    Arial,
    sans-serif;

  overflow:hidden;
}

/* 📱 TELEFONO */
.phone{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.25);

  width:min(420px, 90vw);
  aspect-ratio:9/16;

  overflow:hidden;
  background:url("Untitled homexcreen.jpg") center/cover no-repeat;
  color:white;
}

/* GRID */
.apps{
  position:absolute;
  top:95px;
  width:100%;

  display:grid;
  grid-template-columns:repeat(4,1fr);
  justify-items:center;
  row-gap:40px;
}

/* APP */
.app{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-decoration:none;
  color:white;

  font-size:13px;
  font-weight:500;

  text-shadow:0 1px 2px rgba(0,0,0,0.9);
}

/* ICONOS */
.app img{
  width:100px;
  height:100px;
  border-radius:22%;
  object-fit:cover;

  /* sombra ligera estilo iOS */
  box-shadow:0 6px 12px rgba(0,0,0,0.35);

  transition:.15s ease;
}

/* CLICK */
.app:active img{
  transform:scale(0.88);
}

/* 📱 MOBILE */
@media (max-width:768px){
  .phone{
    width:100vw;
    height:100dvh;
    aspect-ratio:auto;

    top:0;
    left:0;
    transform:none;
  }

  .app img{
    width:85px;
    height:85px;
  }
}
</style>
</head>

<body>

<div class="phone">

  <div class="apps">

    <!-- 🔥 PRIMERA FILA -->
    <a class="app" href="https://www.youtube.com/@loveubyae">
      <img src="yt.png">
      <span>YouTube</span>
    </a>

    <a class="app" href="https://www.instagram.com/loveubyae/">
      <img src="insta.png">
      <span>Instagram</span>
    </a>

    <a class="app" href="https://open.spotify.com/intl-es/artist/3mKaKeiv9UUbJSAHr8VqFe">
      <img src="spotify-2012-06-25.png">
      <span>Spotify</span>
    </a>

    <a class="app" href="https://music.apple.com/us/artist/loveubyae/1742559202">
      <img src="music app.png">
      <span>Music</span>
    </a>

    <!-- 🔥 SEGUNDA FILA -->
    <a class="app" href="https://soundcloud.com/loveubyae">
      <img src="sc.png">
      <span>SoundCloud</span>
    </a>

    <div class="app">
      <img src="calculator.png">
      <span>Calculator</span>
    </div>

    <div class="app">
      <img src="clock.png">
      <span>Clock</span>
    </div>

    <div class="app">
      <img src="weather.png">
      <span>Weather</span>
    </div>

    <!-- 🔥 TERCERA FILA -->
    <div class="app">
      <img src="maps.png">
      <span>Maps</span>
    </div>

  </div>

</div>

</body>
</html>
