<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cuidarte</title>

<meta name="app-version" content="1.0.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  height:100%;
  overflow:hidden;
}

/* 🔒 */
body{
  user-select:none;
  -webkit-user-select:none;

  height:100dvh;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  font-family:-apple-system;
  overflow:hidden;

  overscroll-behavior-x:none;
  touch-action:pan-y;
}

/* PHONE */
.phone{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.25);

  width:min(420px, 90vw);
  aspect-ratio:9/16;
  overflow:hidden;
  background:#000;

  transition:transform .25s ease, opacity .25s ease;
}

/* HOME DETRÁS */
#homeBg{
  position:absolute;
  inset:0;
  background:url("Untitled homexcreen.jpg") center/cover no-repeat;

  transform:scale(0.95);
  opacity:0;
  z-index:0;

  transition:transform .25s ease, opacity .25s ease;
}

/* GRID */
.gallery{
  position:relative;
  z-index:1;

  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:1px;
  padding:2px;

  height:100%;
  overflow-y:auto;
  overflow-x:hidden;

  background:black;
}

.gallery img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  display:block;
  cursor:pointer;
}

/* VIEWER */
.viewer{
  position:absolute;
  inset:0;
  background:black;
  display:none;
  z-index:2;
}

.viewer img{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:100%;
  max-height:100%;
}

/* MOBILE */
@media (max-width:768px){
  .phone{
    width:100vw;
    height:100dvh;
    aspect-ratio:auto;
    top:0;
    left:0;
    transform:none;
  }
}
</style>
</head>

<body>

<div class="phone" id="phone">

  <div id="homeBg"></div>

  <div class="gallery" id="gallery"></div>

  <div class="viewer" id="viewer">
    <img id="fullImg">
  </div>

</div>

<script>
const VERSION="1.0.0";

history.scrollRestoration = "manual";

const gallery = document.getElementById("gallery");
const viewer = document.getElementById("viewer");
const fullImg = document.getElementById("fullImg");
const phone = document.getElementById("phone");
const homeBg = document.getElementById("homeBg");

let currentIndex = 0;

/* IMÁGENES (igual que el tuyo) */
const images = [
"0b04015b70a2d5fb9b2ec735ebce50c3.jpg",
"0ef281a5f2464955e05fd78472ce5586.jpg",
"1ab22edfe6280b188acde61352aa2e22.jpg",
"4e85354e941a66f05d9e16e67f71eeed.jpg",
"5cec07c8e16fd9ddd665f9882af38004.jpg",
"7cb6a6f8ae534157eef45361fc73db5a.jpg",
"7f677c2483d47a034c70d70c562ff6e5.jpg",
"13bbd427e2ca047950cdbc8a53eeb4b0.jpg",
"14d0c1005d03e7fbe8d409769a1546ac.jpg",
"17f3852a6d56a1ea69438b49dab7441d.jpg",
"18a70ace7a553274c001628c316a657f.jpg",
"19f4667fe05ff0146ed2e8bdfd89f4fd.jpg",
"20cf3088885c620b2465e36e87fdff43.jpg",
"27ed036f1f02b3d6803ffa64f8432ecb.jpg",
"33e563c3475eec7e57bed17dec06e42c.jpg",
"59f1b153d560b92eb5d4845a0381364a.jpg",
"234af183187b0608dc25b9df26716252.jpg",
"341b1b7b475a5e85691c2d5c2d6b93fd.jpg",
"740d1fa80a6db988838b9725245a4352.jpg",
"29447cad937521e038c3c8c9c92c5e63.jpg",
"36356c199ce9187c6ee5c4c644f78d59.jpg",
"3567269df24eadcb89c30537fa4d3317.jpg",
"4596473c2298ff4486da13c98bebd4ab.jpg",
"6986150b42e3564df5b6073689776e52.jpg",
"499662621d0dc0b920f8516657817fc1.jpg",
"2787745547da2bca453ef0022ff79527.jpg",
"a5b4107dff9f4426aa291ef9d4d7dd63.jpg",
"a5bcbea077cf16c30fc440a5f7866409.jpg",
"abdff1af8fe1d47ba76025f5524956ec.jpg",
"af161e32956c2c227578241052b909c8.jpg",
"b2cf611639fedf2385cce18fa77618c6.jpg",
"bcdfdd05419915533c7d73d9023d9403.jpg",
"c0ee62dc9f0f9124af9b9f6b3ed16c1c.jpg",
"c45c4ff8edbc6c38f6f7d8530264ee3a.jpg",
"cbca8c1cc3ca35ab841d7819e7f7a0aa.jpg",
"ccedae1137e24032969d3fed39bf20ba.jpg",
"d0e1d84ad457e9ee48323eb1f5d17a55.jpg",
"d064fafb8a52930d89f00d2897bbb7b5.jpg",
"dfe6d0996cdf31e6e46873e4d413570e.jpg",
"e17dc13cdb7e22db69d2ff572cb75141.jpg",
"e338cbbb843d12dd946b9e11003def65.jpg",
"ee702793877f29b8ee14dab06fad5fe9.jpg",
"f6aeb320d061abf620503a5a470687f7.jpg",
"f8dcf3fda74b52a267bbdaf45c8733f7.jpg"
];

/* GRID */
images.forEach((src,index)=>{
  const img = document.createElement("img");
  img.src = src;

  img.onclick = ()=>{
    currentIndex = index;
    openViewer();
  };

  gallery.appendChild(img);
});

/* OPEN */
function openViewer(){
  viewer.style.display = "block";
  fullImg.src = images[currentIndex];
}

/* CLOSE */
viewer.onclick = ()=>{
  viewer.style.display = "none";
};

/* SWIPE FOTOS */
let startX = 0;

viewer.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

viewer.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;

  if(endX - startX > 50){
    currentIndex--;
  }else if(startX - endX > 50){
    currentIndex++;
  }

  if(currentIndex < 0) currentIndex = images.length-1;
  if(currentIndex >= images.length) currentIndex = 0;

  fullImg.src = images[currentIndex];
});

/* SWIPE BACK */
let swipeStart = 0;
let isEdge = false;

window.addEventListener("touchstart", e=>{
  swipeStart = e.touches[0].clientX;

  if(swipeStart < 25){
    isEdge = true;
    homeBg.style.opacity = "1";
  }
});

window.addEventListener("touchmove", e=>{
  if(!isEdge) return;

  e.preventDefault();

  let x = e.touches[0].clientX;
  let diff = x - swipeStart;

  if(diff > 0){
    let progress = diff / window.innerWidth;

    phone.style.transform = `translateX(${diff}px) scale(${1 - progress*0.05})`;

    homeBg.style.transform = `scale(${0.95 + progress*0.05})`;
    homeBg.style.opacity = progress;
  }
},{ passive:false });

window.addEventListener("touchend", e=>{
  if(!isEdge) return;

  isEdge = false;

  let diff = e.changedTouches[0].clientX - swipeStart;

  if(diff > 120){
    goHome();
  }else{
    phone.style.transform = "translateX(0) scale(1)";
    homeBg.style.transform = "scale(0.95)";
    homeBg.style.opacity = "0";
  }
});

/* PC (FIX) */
document.addEventListener("keydown", e=>{
  const k = e.key.toLowerCase();

  if(
    k==="arrowleft" ||
    k==="arrowright" ||
    k==="a" ||
    k==="d"
  ){
    goHome();
  }
});

/* HOME */
function goHome(){
  phone.style.transform = "translateX(100%) scale(0.95)";
  phone.style.opacity = "0";

  homeBg.style.transform = "scale(1)";
  homeBg.style.opacity = "1";

  setTimeout(()=>{
    window.location.href = "home.html?v="+VERSION;
  },200);
}

/* BLOQUEOS */

/* click derecho */
document.addEventListener("contextmenu",e=>e.preventDefault());

/* F12 FIX (no rompe teclado) */
document.addEventListener("keydown",e=>{
  const k = e.key.toLowerCase();

  if(
    e.key==="F12" ||
    (e.ctrlKey && e.shiftKey && ["i","j","c"].includes(k)) ||
    (e.ctrlKey && k==="u")
  ){
    e.preventDefault();
    e.stopPropagation();
  }
});
</script>

</body>
</html>
