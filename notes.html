<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cuidarte</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100dvh;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  font-family:-apple-system;
  overflow:hidden;
}

/* 📱 PHONE */
.phone{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.25);

  width:min(420px, 90vw);
  aspect-ratio:9/16;

  overflow:hidden;
  background:black;

  transition:transform .25s ease, opacity .25s ease;
}

/* IMAGEN */
.phone img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* MOBILE */
@media (max-width:768px){
  .phone{
    width:100vw;
    height:100dvh;
    aspect-ratio:auto;
    top:0;
    left:0;
    transform:none;
  }
}
</style>
</head>

<body>

<div class="phone" id="phone">
  <img src="notasfoto.jpg">
</div>

<script>
const phone = document.getElementById("phone");

let startX = 0;
let currentX = 0;
let isDragging = false;

/* 👉 SOLO desde el borde izquierdo */
phone.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;

  if(startX < 30){ // 🔥 zona edge
    isDragging = true;
  }
});

/* 👉 mover */
phone.addEventListener("touchmove", e=>{
  if(!isDragging) return;

  e.preventDefault(); // 🔥 bloquea gesto del navegador

  currentX = e.touches[0].clientX;
  let diff = currentX - startX;

  if(diff > 0){
    phone.style.transform = `translateX(${diff}px)`;
  }
},{ passive:false });

/* 👉 soltar */
phone.addEventListener("touchend", ()=>{
  if(!isDragging) return;

  isDragging = false;

  let diff = currentX - startX;

  if(diff > 100){
    phone.style.transform = "translateX(100%)";
    phone.style.opacity = "0";

    setTimeout(()=>{
      window.location.href = "home.html";
    },250);
  }else{
    phone.style.transform = "translateX(0)";
  }
});
</script>

</body>
</html>
