<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cuidarte</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100dvh;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  font-family:-apple-system;
  overflow:hidden;
}

/* 📱 PHONE */
.phone{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.25);

  width:min(420px, 90vw);
  aspect-ratio:9/16;

  overflow:hidden;
  background:black;
}

/* IMAGEN */
.phone img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🔙 BACK */
.back{
  position:absolute;
  top:55px;
  left:12px;

  color:white;
  font-size:14px;
  text-decoration:none;
  font-weight:500;

  padding:6px 12px;

  background:linear-gradient(#5f5f5f,#2f2f2f);
  border-radius:6px;

  box-shadow:
    inset 0 1px rgba(255,255,255,0.25),
    0 1px 2px rgba(0,0,0,0.6);

  z-index:10;
}

/* MOBILE */
@media (max-width:768px){
  .phone{
    width:100vw;
    height:100dvh;
    aspect-ratio:auto;
    top:0;
    left:0;
    transform:none;
  }
}
</style>
</head>

<body>

<div class="phone">

  <!-- 🔙 BOTÓN -->
  <a class="back" href="home.html">← Back</a>

  <!-- 📄 IMAGEN -->
  <img src="notasfoto.jpg">

</div>

</body>
</html>
