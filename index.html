<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  overflow:hidden;
}

/* 📱 TELEFONO */
.phone{
  width:clamp(320px, 28vw, 480px);
  aspect-ratio:9/16;
  position:relative;
  overflow:hidden;
  background:url("Untitled.jpg") center/cover no-repeat;
}

/* 🎛️ NOISE PRO */
.phone::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:
    repeating-radial-gradient(circle,
      rgba(255,255,255,0.05) 0,
      rgba(0,0,0,0.05) 1px,
      transparent 1px,
      transparent 2px
    );

  opacity:0.4;
  mix-blend-mode:overlay;
  pointer-events:none;
  z-index:3;
}

/* overlay */
.phone::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.05),
    rgba(0,0,0,0.4)
  );
}

/* 🕒 */
.time-box{
  position:absolute;
  top:8vh;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  text-align:center;
  z-index:2;
}

.time-bg{
  position:absolute;
  top:-25px;
  width:100%;
  height:160px;
  background:rgba(0,0,0,0.18);
}

.time{
  font-size:clamp(70px, 10vw, 95px);
  font-weight:100;
  letter-spacing:-3px;
  color:#fff;
}

.date{
  font-size:clamp(16px, 2.5vw, 22px);
  color:#fff;
}

/* 🔔 */
.notifications{
  position:absolute;
  top:30vh;
  width:100%;
  z-index:2;
}

.notification{
  display:flex;
  align-items:center;
  gap:14px;
  padding:16px;

  background:rgba(40,40,40,0.75);
  backdrop-filter:blur(4px);

  color:white;

  border-top:1px solid rgba(255,255,255,0.25);
  border-bottom:1px solid rgba(0,0,0,0.6);
}

.notification img{
  width:60px;
  height:60px;
  border-radius:10px;
}

.notification-text{
  flex:1;
}

.notification-text b{
  font-size:17px;
}

.notification-text p{
  font-size:15px;
}

.notification-time{
  font-size:14px;
  opacity:0.8;
}

/* 🔓 */
.slider{
  position:absolute;
  bottom:4vh;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  height:75px;

  border-radius:20px;
  background:linear-gradient(#3a3a3a,#000);

  display:flex;
  align-items:center;
  padding:8px;
  z-index:2;

  box-shadow:
    inset 0 1px 2px rgba(255,255,255,0.2),
    inset 0 -2px 5px rgba(0,0,0,0.7);
}

.slider-btn{
  width:85px;
  height:60px;
  border-radius:16px;

  background:linear-gradient(#fff,#cfcfcf);

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:30px;
  color:#777;

  box-shadow:
    0 3px 8px rgba(0,0,0,0.7),
    inset 0 1px 1px rgba(255,255,255,0.9);
}

.slider-text{
  width:100%;
  text-align:center;
  color:rgba(255,255,255,0.35);
  font-size:22px;
  animation:glow 2s infinite;
}

@keyframes glow{
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}

/* 📱 MOBILE FULLSCREEN */
@media (max-width:768px){

  body{
    align-items:flex-start;
  }

  .phone{
    width:100vw;
    height:100vh;
    aspect-ratio:unset;
  }

}

/* 💻 PC SCALE BONITO */
@media (min-width:900px){

  .phone{
    transform:scale(1.15);
  }

}
</style>
</head>

<body>

<div class="phone">

  <div class="time-box">
    <div class="time-bg"></div>
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
  </div>

  <div class="notifications">

    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17eff8b85e.jpg">
      <div class="notification-text">
        <b>loveubyae</b>
        <p>Por primera vez<br>nueva canción disponible</p>
      </div>
      <div class="notification-time">ahora</div>
    </div>

    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17eff8b85e.jpg">
      <div class="notification-text">
        <b>Spotify</b>
        <p>Ya disponible en tu perfil</p>
      </div>
      <div class="notification-time">2m</div>
    </div>

    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17eff8b85e.jpg">
      <div class="notification-text">
        <b>YouTube</b>
        <p>Nuevo video publicado 🔥</p>
      </div>
      <div class="notification-time">1d</div>
    </div>

    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17eff8b85e.jpg">
      <div class="notification-text">
        <b>Instagram</b>
        <p>Nuevo seguidor</p>
      </div>
      <div class="notification-time">1sem</div>
    </div>

  </div>

  <div class="slider">
    <div class="slider-btn">→</div>
    <div class="slider-text">slide to unlock</div>
  </div>

</div>

<script>
function updateTime(){
  const now=new Date();

  document.getElementById("time").textContent=
    now.toLocaleTimeString("es-MX",{
      hour:"2-digit",
      minute:"2-digit",
      hour12:false
    });

  document.getElementById("date").textContent=
    now.toLocaleDateString("es-MX",{
      weekday:"long",
      day:"numeric",
      month:"long"
    });
}

setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
