<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>loveubyae</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Helvetica Neue", Arial;
}

body {
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* PHONE */
.phone {
  width: 400px;
  height: 750px;
  position: relative;
}

/* LOCKSCREEN */
.lock {
  width: 100%;
  height: 100%;
  background: url('Untitled.jpg') center/cover no-repeat;
  position: relative;
}

/* STATUS BAR */
.statusbar {
  position: absolute;
  top: 0;
  width: 100%;
  height: 30px;
  background: rgba(0,0,0,0.7);
  color: white;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  padding: 5px 10px;
}

.lockicon {
  position: absolute;
  top: 3px;
  width: 100%;
  text-align: center;
}

/* TIME */
.time {
  position: absolute;
  top: 90px;
  width: 100%;
  text-align: center;
  font-size: 80px;
  color: white;
  font-weight: 100;
}

.date {
  position: absolute;
  top: 180px;
  width: 100%;
  text-align: center;
  font-size: 20px;
  color: white;
}

/* NOTIFICATION */
.notification {
  position: absolute;
  bottom: 200px;
  width: 90%;
  left: 5%;
  background: rgba(0,0,0,0.6);
  border-radius: 14px;
  display: flex;
  padding: 12px;
  color: white;
  backdrop-filter: blur(12px);
}

.notification img {
  width: 55px;
  height: 55px;
  border-radius: 6px;
  margin-right: 10px;
}

.notification-text {
  font-size: 13px;
}

.now {
  position: absolute;
  right: 10px;
  top: 10px;
  font-size: 11px;
  color: #ccc;
}

/* SLIDER (REAL iOS STYLE) */
.slider-container {
  position: absolute;
  bottom: 40px;
  width: 90%;
  left: 5%;
  height: 60px;
  border-radius: 30px;
  background: linear-gradient(rgba(255,255,255,0.15), rgba(0,0,0,0.3));
  overflow: hidden;
}

.slider {
  width: 70px;
  height: 60px;
  background: linear-gradient(#f2f2f2, #cfcfcf);
  border-radius: 30px;
  position: absolute;
  left: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
}

.slider::after {
  content: "➜";
  font-size: 24px;
  color: #555;
}

.slide-text {
  position: absolute;
  width: 100%;
  text-align: center;
  line-height: 60px;
  color: #aaa;
  font-size: 18px;
  letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="phone">
  <div class="lock" id="lock">

    <!-- STATUS -->
    <div class="statusbar">
      <span>diario</span>
      <span>🔋 17%</span>
    </div>

    <div class="lockicon">🔒</div>

    <!-- TIME -->
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>

    <!-- NOTIFICATION -->
    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17effb85e.jpg">
      <div class="notification-text">
        <b>loveubyae</b><br>
        Por primera vez<br>
        nueva canción y video disponibles en todos lados!!!
      </div>
      <div class="now">ahora</div>
    </div>

    <!-- SLIDER -->
    <div class="slider-container">
      <div class="slider" id="slider"></div>
      <div class="slide-text">slide to unlock</div>
    </div>

  </div>
</div>

<script>
// TIME
function updateTime() {
  let now = new Date();

  let time = now.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });

  let date = now.toLocaleDateString('es-ES', {
    weekday: 'long',
    month: 'long',
    day: 'numeric'
  });

  document.getElementById("time").innerText = time;
  document.getElementById("date").innerText = date;
}
setInterval(updateTime, 1000);
updateTime();

// SLIDER REAL
let slider = document.getElementById("slider");
let isDragging = false;

slider.addEventListener("mousedown", () => isDragging = true);
document.addEventListener("mouseup", () => isDragging = false);

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  let rect = slider.parentElement.getBoundingClientRect();
  let x = e.clientX - rect.left;

  if (x > 0 && x < rect.width - 70) {
    slider.style.left = x + "px";
  }

  if (x > rect.width - 80) {
    document.getElementById("lock").style.display = "none";
  }
});
</script>

</body>
</html>
