<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

/* 📱 TELEFONO */
.phone{
  width:clamp(320px, 28vw, 480px);
  aspect-ratio:9/16;
  position:relative;
  overflow:hidden;
  background:url("Untitled.jpg") center/cover no-repeat;
  box-shadow:none;
}

/* 🎛️ NOISE iOS REAL */
.phone::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:
    repeating-radial-gradient(
      circle at 0 0,
      rgba(255,255,255,0.06) 0px,
      rgba(0,0,0,0.06) 1px,
      transparent 1px,
      transparent 2px
    ),
    repeating-radial-gradient(
      circle at 30% 70%,
      rgba(255,255,255,0.04) 0px,
      rgba(0,0,0,0.04) 2px,
      transparent 2px,
      transparent 4px
    ),
    repeating-radial-gradient(
      circle at 80% 20%,
      rgba(255,255,255,0.03) 0px,
      rgba(0,0,0,0.03) 3px,
      transparent 3px,
      transparent 6px
    );

  opacity:0.55;
  mix-blend-mode:overlay;
  pointer-events:none;
  z-index:3;
}

/* overlay */
.phone::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.05),
    rgba(0,0,0,0.4)
  );
}

/* 🕒 */
.time-box{
  position:absolute;
  top:70px;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  text-align:center;
  z-index:2;
}

.time-bg{
  position:absolute;
  top:-30px;
  width:100%;
  height:170px;
  background:rgba(0,0,0,0.15);
}

.time{
  font-size:92px;
  font-weight:100;
  letter-spacing:-3px;
  color:#ffffff;
}

.date{
  font-size:22px;
  font-weight:300;
  color:#ffffff;
  opacity:0.95;
}

/* 🔔 NOTIFICACIONES */
.notifications{
  position:absolute;
  top:260px;
  width:100%;
  display:flex;
  flex-direction:column;
  z-index:2;
}

.notification{
  display:flex;
  align-items:center;
  gap:14px;
  padding:16px 18px;

  background:rgba(40,40,40,0.75);
  backdrop-filter:blur(4px);

  color:white;

  border-top:1px solid rgba(255,255,255,0.25);
  border-bottom:1px solid rgba(0,0,0,0.6);
}

.notification img{
  width:60px;
  height:60px;
  border-radius:10px;
}

.notification-text{
  flex:1;
}

.notification-text b{
  font-size:17px;
}

.notification-text p{
  font-size:15px;
}

.notification-time{
  font-size:14px;
  opacity:0.8;
}

/* 🔓 SLIDER */
.slider{
  position:absolute;
  bottom:35px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:80px;

  border-radius:20px;

  background:linear-gradient(to bottom,#3a3a3a,#000);

  box-shadow:
    inset 0 1px 2px rgba(255,255,255,0.2),
    inset 0 -2px 5px rgba(0,0,0,0.7);

  display:flex;
  align-items:center;
  padding:8px;
  z-index:2;
}

.slider-btn{
  width:90px;
  height:64px;
  border-radius:16px;

  background:linear-gradient(to bottom,#fff,#cfcfcf);

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:32px;
  color:#777;

  box-shadow:
    0 3px 8px rgba(0,0,0,0.7),
    inset 0 1px 1px rgba(255,255,255,0.9);
}

.slider-text{
  width:100%;
  text-align:center;
  color:rgba(255,255,255,0.35);
  font-size:24px;
  letter-spacing:1px;
  animation:glow 2s infinite;
}

@keyframes glow{
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}
</style>
</head>

<body>

<div class="phone">

  <div class="time-box">
    <div class="time-bg"></div>
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
  </div>

  <div class="notifications">

    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17eff8b85e.jpg">
      <div class="notification-text">
        <b>loveubyae</b>
        <p>Por primera vez<br>nueva canción disponible</p>
      </div>
      <div class="notification-time">ahora</div>
    </div>

    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17eff8b85e.jpg">
      <div class="notification-text">
        <b>Spotify</b>
        <p>Ya disponible en tu perfil</p>
      </div>
      <div class="notification-time">2m</div>
    </div>

    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17eff8b85e.jpg">
      <div class="notification-text">
        <b>YouTube</b>
        <p>Nuevo video publicado 🔥</p>
      </div>
      <div class="notification-time">1d</div>
    </div>

    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17eff8b85e.jpg">
      <div class="notification-text">
        <b>Instagram</b>
        <p>Nuevo seguidor</p>
      </div>
      <div class="notification-time">1sem</div>
    </div>

  </div>

  <div class="slider">
    <div class="slider-btn">→</div>
    <div class="slider-text">slide to unlock</div>
  </div>

</div>

<script>
function updateTime(){
  const now=new Date();

  document.getElementById("time").textContent=
    now.toLocaleTimeString("es-MX",{
      hour:"2-digit",
      minute:"2-digit",
      hour12:false
    });

  document.getElementById("date").textContent=
    now.toLocaleDateString("es-MX",{
      weekday:"long",
      day:"numeric",
      month:"long"
    });
}

setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
