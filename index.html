<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  overflow:hidden;
}

/* 📱 TELEFONO */
.phone{
  width:clamp(320px, 28vw, 480px);
  aspect-ratio:9/16;
  position:relative;
  overflow:hidden;
  background:url("Untitled.jpg") center/cover no-repeat;
}

/* NOISE */
.phone::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    repeating-radial-gradient(circle,
      rgba(255,255,255,0.05) 0,
      rgba(0,0,0,0.05) 1px,
      transparent 1px,
      transparent 2px
    );
  opacity:0.4;
  mix-blend-mode:overlay;
  z-index:3;
}

/* overlay */
.phone::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.05),
    rgba(0,0,0,0.4)
  );
}

/* 🕒 */
.time-box{
  position:absolute;
  top:6vh;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  text-align:center;
  z-index:2;
}

.time-bg{
  position:absolute;
  top:-25px;
  width:100%;
  height:160px;
  background:rgba(0,0,0,0.18);
}

.time{
  font-size:clamp(70px, 10vw, 95px);
  font-weight:100;
  letter-spacing:-3px;
  color:#fff;
}

.date{
  font-size:clamp(16px, 2.5vw, 22px);
  color:#fff;
}

/* 🔔 */
.notifications{
  position:absolute;
  top:30vh;
  width:100%;
  z-index:2;
}

.notification{
  display:flex;
  align-items:center;
  gap:14px;
  padding:16px;
  background:rgba(40,40,40,0.75);
  backdrop-filter:blur(4px);
  color:white;
  border-top:1px solid rgba(255,255,255,0.25);
  border-bottom:1px solid rgba(0,0,0,0.6);
}

.notification img{
  width:60px;
  height:60px;
  border-radius:10px;
}

/* 🔓 SLIDER */
.slider{
  position:absolute;
  bottom:calc(env(safe-area-inset-bottom) + 12px); /* 🔥 CLAVE */
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:95px;

  border-radius:26px;
  background:linear-gradient(#3a3a3a,#000);

  display:flex;
  align-items:center;
  padding:10px;
  z-index:2;
}

.slider-btn{
  width:105px;
  height:75px;
  border-radius:20px;
  background:linear-gradient(#fff,#cfcfcf);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:34px;
  color:#777;
}

/* 📱 MOBILE FIX REAL */
@media (max-width:768px){

  body{
    align-items:flex-start;
  }

  .phone{
    width:100vw;
    height:100dvh; /* 🔥 en vez de 100vh */
    aspect-ratio:unset;
    transform:none; /* ❌ quitamos scale */
  }

  .time{
    font-size:clamp(90px, 18vw, 120px);
    font-weight:200;
    letter-spacing:-4px;
  }

  .date{
    font-size:20px;
  }

}
</style>
</head>

<body>

<div class="phone">

  <div class="time-box">
    <div class="time-bg"></div>
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
  </div>

  <div class="notifications">

    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17eff8b85e.jpg">
      <div>
        <b>Por primera vez</b><br>
        Cancion y Video ya disponibles.
      </div>
      <div style="margin-left:auto;">ahora</div>
    </div>

    <div class="notification">
      <img src="e39f464b381314bc3eafa5fca98d3619.jpg">
      <div>
        <b>Cuidarte</b><br>
        Sabes que esto es pa' ti
      </div>
      <div style="margin-left:auto;">2m</div>
    </div>

    <div class="notification">
      <img src="d1c1e261bac1d690afacc103cfc481d3.jpg">
      <div>
        <b>melodia</b><br>
        ¿¿¿¿Me notas???!?
      </div>
      <div style="margin-left:auto;">1d</div>
    </div>

    <div class="notification">
      <img src="8761603c6a06cf054f7368b88f6c2dc6.jpg">
      <div>
        <b>#diario</b><br>
        Tu saldo esta a punto de terminar.
      </div>
      <div style="margin-left:auto;">1sem</div>
    </div>

  </div>

  <div class="slider">
    <div class="slider-btn">→</div>
    <div style="width:100%; text-align:center; color:rgba(255,255,255,0.4); font-size:26px;">
      slide to unlock
    </div>
  </div>

</div>

<script>
function updateTime(){
  const now=new Date();

  document.getElementById("time").textContent=
    now.toLocaleTimeString("es-MX",{
      hour:"2-digit",
      minute:"2-digit",
      hour12:false
    });

  document.getElementById("date").textContent=
    now.toLocaleDateString("es-MX",{
      weekday:"long",
      day:"numeric",
      month:"long"
    });
}

setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
