<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link rel="icon" type="image/jpeg" href="favicon.jpg">
<link rel="apple-touch-icon" href="favicon.jpg">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  overflow:hidden;
}

/* 📱 TELEFONO */
.phone{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.25);

  width:min(420px, 90vw);
  aspect-ratio:9/16;

  overflow:hidden;
  background:url("Untitled.jpg") center/cover no-repeat;
  color:white;

  display:flex;
  flex-direction:column;
}

/* overlay */
.phone::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.15),
    rgba(0,0,0,0.05),
    rgba(0,0,0,0.3)
  );
  pointer-events:none;
}

/* 🕒 */
.time-box{
  position:absolute;
  top:6%;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  text-align:center;
  z-index:2;
}

.time-bg{
  position:absolute;
  top:-25px;
  width:100%;
  height:160px;
  background:rgba(0,0,0,0.35);
}

.time{
  font-size:clamp(60px,5vw,90px);
  font-weight:100;
}

.date{
  font-size:clamp(14px,1.2vw,20px);
}

/* 🔥 NOTIFICATIONS DESKTOP */
.notifications{
  position:absolute;
  top:220px;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:420px;
  z-index:2;
}

.notification{
  display:flex;
  align-items:center;
  gap:14px;
  padding:16px;
  background:rgba(40,40,40,0.55);
  backdrop-filter:blur(2px);
  color:white;
  border-top:1px solid rgba(255,255,255,0.15);
}

.notification img{
  width:60px;
  height:60px;
  border-radius:10px;
}

/* 🔓 SLIDER */
.slider{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  height:95px;
  border-radius:26px;
  background:linear-gradient(#3a3a3a,#000);
  display:flex;
  align-items:center;
  padding:10px;
  z-index:2;
}

.slider-btn{
  width:105px;
  height:75px;
  border-radius:20px;
  background:linear-gradient(#fff,#cfcfcf);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:34px;
  color:#777;
  touch-action:none;
  cursor:pointer;
  z-index:5;
}

.slider-text{
  width:100%;
  text-align:center;
  font-size:26px;

  background: linear-gradient(
    90deg,
    rgba(255,255,255,0.2) 0%,
    rgba(255,255,255,0.2) 40%,
    rgba(255,255,255,0.9) 50%,
    rgba(255,255,255,0.2) 60%,
    rgba(255,255,255,0.2) 100%
  );

  background-size:200% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:shineMove 3.8s linear infinite;
  pointer-events:none;
}

@keyframes shineMove{
  from{background-position:100% 0;}
  to{background-position:-100% 0;}
}

/* 📱 MOBILE FIX REAL */
@media (max-width:768px){
  .phone{
    width:100vw;
    height:100vh;
    aspect-ratio:auto;
    top:0;
    left:0;
    transform:none;
  }

  /* 🔥 AQUÍ ESTÁ EL FIX */
  .notifications{
    top:28vh; /* 👈 ahora SI adapta al teléfono */
    left:0;
    transform:none;
    max-width:none;
    width:100%;
  }
}
</style>
</head>

<body>

<div class="phone">

  <div class="time-box">
    <div class="time-bg"></div>
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
  </div>

  <div class="notifications">

    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17eff8b85e.jpg">
      <div><b>Por primera vez</b><br>Cancion y Video ya disponibles.</div>
      <div style="margin-left:auto;">ahora</div>
    </div>

    <div class="notification">
      <img src="e39f464b381314bc3eafa5fca98d3619.jpg">
      <div><b>Cuidarte</b><br>Sabes que esto es pa' ti</div>
      <div style="margin-left:auto;">2m</div>
    </div>

    <div class="notification">
      <img src="d1c1e261bac1d690afacc103cfc481d3.jpg">
      <div><b>melodia</b><br>¿¿¿¿Me notas???!?</div>
      <div style="margin-left:auto;">1d</div>
    </div>

    <div class="notification">
      <img src="8761603c6a06cf054f7368b88f6c2dc6.jpg">
      <div><b>#diario</b><br>Tu saldo esta a punto de terminar.</div>
      <div style="margin-left:auto;">1sem</div>
    </div>

  </div>

  <div class="slider">
    <div class="slider-btn">→</div>
    <div class="slider-text">slide to unlock</div>
  </div>

</div>

<script>
function updateTime(){
  const now=new Date();
  time.textContent=now.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit",hour12:false});
  date.textContent=now.toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"});
}
setInterval(updateTime,1000);
updateTime();

/* SLIDER */
const btn=document.querySelector(".slider-btn");
const slider=document.querySelector(".slider");
const text=document.querySelector(".slider-text");

let dragging=false,startX=0;

btn.addEventListener("pointerdown",e=>{
  dragging=true;
  startX=e.clientX;
});

window.addEventListener("pointermove",e=>{
  if(!dragging)return;

  let dx=e.clientX-startX;
  let max=slider.offsetWidth-btn.offsetWidth-20;

  if(dx<0)dx=0;
  if(dx>max)dx=max;

  btn.style.transform=`translateX(${dx}px)`;

  let progress=dx/max;
  text.style.opacity=1-progress;

  if(dx>=max)unlock();
});

window.addEventListener("pointerup",()=>{
  dragging=false;
  btn.style.transform="translateX(0)";
  text.style.opacity="1";
});

function unlock(){
  const phone=document.querySelector(".phone");

  phone.style.transition="transform 0.7s cubic-bezier(0.25,0.8,0.25,1), opacity 0.5s ease, filter 0.5s ease";
  phone.style.transform="translateY(-120px) scale(1.03)";
  phone.style.opacity="0";
  phone.style.filter="blur(6px)";

  setTimeout(()=>{
    window.location.href="home.html";
  },650);
}
</script>

</body>
</html>
