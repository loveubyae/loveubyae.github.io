<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cuidarte</title>

<script>
function setRealVH(){
  let vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', vh + 'px');
}
setRealVH();
window.addEventListener('resize', setRealVH);
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html, body{
  height:100%;
  overflow:hidden;
}

body{
  height:calc(var(--vh, 1vh) * 100);
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

/* 📱 PC (NO TOCAR) */
.phone{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.25);

  width:min(420px, 90vw);
  aspect-ratio:9/16;

  overflow:hidden;
  background:url("Untitled.jpg") center/cover no-repeat;
  color:white;

  display:flex;
  flex-direction:column;
}

/* overlay */
.phone::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.15),
    rgba(0,0,0,0.05),
    rgba(0,0,0,0.3)
  );
  pointer-events:none;
}

/* TIME */
.time-box{
  position:absolute;
  top:6%;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  text-align:center;
  z-index:2;
}

.time-bg{
  position:absolute;
  top:-25px;
  width:100%;
  height:190px;
  background:rgba(0,0,0,0.35);
}

.time{
  font-size:clamp(80px,7vw,96px);
}

.date{
  font-size:clamp(20px,1.2vw,20px);
}

/* NOTIFICATIONS */
.notifications{
  position:absolute;
  top:220px;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:420px;
  z-index:2;
}

.notification{
  display:flex;
  align-items:center;
  gap:14px;
  padding:16px;
  background:rgba(40,40,40,0.60);
  color:white;
}

.notification img{
  width:60px;
  height:60px;
  border-radius:10px;
}

/* UNLOCK */
.unlock-bar{
  position:absolute;
  bottom:0;
  width:100%;
  height:90px;
  background:rgba(0,0,0,0.9);
}

.swipe-text{
  position:absolute;
  bottom:28px;
  width:100%;
  text-align:center;
  font-size:26px;

  background:linear-gradient(
    90deg,
    rgba(255,255,255,0.2),
    rgba(255,255,255,0.9),
    rgba(255,255,255,0.2)
  );

  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 3s linear infinite;
}

@keyframes shine{
  from{background-position:100%;}
  to{background-position:-100%;}
}

/* 🔥 FIX REAL MOBILE */
@media (max-width:768px){

  body{
    overflow:hidden;
  }

  .phone{
    position:fixed;   /* 🔥 CLAVE */
    inset:0;          /* 🔥 ocupa toda la pantalla REAL */
    width:100%;
    height:100%;
    transform:none;   /* 🔥 quita centrado bug */
  }

  .notifications{
    left:0;
    transform:none;
    max-width:none;
    width:100%;
  }

}
</style>
</head>

<body>

<div class="phone">

  <div class="time-box">
    <div class="time-bg"></div>
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
  </div>

  <div class="notifications">
    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17eff8b85e.jpg">
      <div><b>Por primera vez</b><br>Cancion y Video ya disponibles.</div>
      <div style="margin-left:auto;">ahora</div>
    </div>

    <div class="notification">
      <img src="e39f464b381314bc3eafa5fca98d3619.jpg">
      <div><b>Cuidarte</b><br>Sabes que esto es pa' ti</div>
      <div style="margin-left:auto;">2m</div>
    </div>

    <div class="notification">
      <img src="d1c1e261bac1d690afacc103cfc481d3.jpg">
      <div><b>melodia</b><br>¿¿¿¿Me notas???!?</div>
      <div style="margin-left:auto;">1d</div>
    </div>

    <div class="notification">
      <img src="8761603c6a06cf054f7368b88f6c2dc6.jpg">
      <div><b>#diario</b><br>Tu saldo esta a punto de terminar.</div>
      <div style="margin-left:auto;">1sem</div>
    </div>
  </div>

  <div class="unlock-bar" id="unlockArea">
    <div class="swipe-text">Swipe to unlock</div>
  </div>

</div>

<script>
function updateTime(){
  const now=new Date();
  time.textContent=now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false});
  date.textContent=now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
}
setInterval(updateTime,1000);
updateTime();

/* SWIPE */
let startY=0,isSwiping=false;

unlockArea.addEventListener("touchstart",e=>{
  startY=e.touches[0].clientY;
  isSwiping=true;
});

unlockArea.addEventListener("touchmove",e=>{
  if(!isSwiping)return;
  let diff=startY-e.touches[0].clientY;
  if(diff>25){
    unlock();
    isSwiping=false;
  }
});

function unlock(){
  const phone=document.querySelector(".phone");
  phone.style.transform="translateY(-120px)";
  phone.style.opacity="0";

  setTimeout(()=>{
    window.location.href="home.html";
  },500);
}
</script>

</body>
</html>
