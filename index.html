<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>loveubyae</title>

<style>
@font-face {
  font-family: ios;
  src: local("Helvetica Neue"), local("Arial");
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: ios;
}

body {
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* FULL SCREEN */
.phone {
  width: 100%;
  max-width: 500px;
  height: 100vh;
  position: relative;
}

/* LOCKSCREEN */
.lock {
  width: 100%;
  height: 100%;
  background: url('Untitled.jpg') center/cover no-repeat;
  position: relative;
}

/* TOP BAR */
.topbar {
  position: absolute;
  top: 0;
  width: 100%;
  height: 30px;
  background: black;
  color: white;
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  padding: 5px 10px;
}

/* LOCK ICON */
.lock-icon {
  position: absolute;
  top: 5px;
  width: 100%;
  text-align: center;
}

/* TIME */
.time {
  position: absolute;
  top: 90px;
  width: 100%;
  text-align: center;
  font-size: 70px;
  color: white;
  font-weight: 200;
}

.date {
  position: absolute;
  top: 170px;
  width: 100%;
  text-align: center;
  font-size: 18px;
  color: white;
  text-transform: capitalize;
}

/* NOTIFICATION */
.notification {
  position: absolute;
  bottom: 160px;
  width: 90%;
  left: 5%;
  background: rgba(0,0,0,0.6);
  border-radius: 12px;
  display: flex;
  padding: 10px;
  color: white;
  backdrop-filter: blur(10px);
}

.notification img {
  width: 50px;
  height: 50px;
  border-radius: 6px;
  margin-right: 10px;
}

.notification-text {
  font-size: 12px;
}

/* SLIDE */
.slide {
  position: absolute;
  bottom: 30px;
  width: 90%;
  left: 5%;
  height: 50px;
  border-radius: 25px;
  background: rgba(255,255,255,0.2);
  overflow: hidden;
}

.slider {
  width: 50px;
  height: 50px;
  background: linear-gradient(#fff,#ddd);
  border-radius: 25px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  position: absolute;
  left: 0;
}

.slider::after {
  content: "➜";
  color: black;
  font-size: 20px;
}

.slide-text {
  position: absolute;
  width: 100%;
  text-align: center;
  line-height: 50px;
  color: #ccc;
  font-size: 14px;
}

/* PC MÁS GRANDE */
@media (min-width: 768px) {
  .phone {
    max-width: 600px;
  }
}
</style>
</head>

<body>

<div class="phone">
  <div class="lock" id="lock">

    <div class="topbar">
      <span>diario</span>
      <span>17%</span>
    </div>

    <div class="lock-icon">🔒</div>

    <div class="time" id="time"></div>
    <div class="date" id="date"></div>

    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17effb85e.jpg">
      <div class="notification-text">
        <b>loveubyae</b><br>
        Por primera vez<br>
        nueva canción y video disponibles en todos lados!!!
      </div>
    </div>

    <div class="slide">
      <div class="slider" id="slider"></div>
      <div class="slide-text">slide to unlock</div>
    </div>

  </div>
</div>

<script>
// TIEMPO EN ESPAÑOL
function updateTime() {
  let now = new Date();

  let time = now.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });

  let date = now.toLocaleDateString('es-ES', {
    weekday: 'long',
    month: 'long',
    day: 'numeric'
  });

  document.getElementById("time").innerText = time;
  document.getElementById("date").innerText = date;
}
setInterval(updateTime, 1000);
updateTime();

// SLIDE FUNCIONAL
let slider = document.getElementById("slider");
let isDragging = false;

slider.addEventListener("mousedown", () => isDragging = true);
document.addEventListener("mouseup", () => isDragging = false);

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  let rect = slider.parentElement.getBoundingClientRect();
  let x = e.clientX - rect.left;

  if (x > 0 && x < rect.width - 50) {
    slider.style.left = x + "px";
  }

  if (x > rect.width - 60) {
    document.getElementById("lock").style.display = "none";
  }
});
</script>

</body>
</html>
