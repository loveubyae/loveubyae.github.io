<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100dvh;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  overflow:hidden;
  font-family:-apple-system;
}

/* 📱 PHONE */
.phone{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.25);

  width:min(420px, 90vw);
  aspect-ratio:9/16;

  overflow:hidden;
  background:url("Untitled homexcreen.jpg") center/cover no-repeat;
}

/* CONTENEDOR */
#container{
  position:absolute;
  inset:0;
}

/* IMÁGENES */
.item{
  position:absolute;
  cursor:pointer;
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* FLASH */
.flash{
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
}

/* GLITCH */
.glitch{
  animation:glitch .1s infinite;
}

@keyframes glitch{
  0%{transform:translate(0);}
  25%{transform:translate(8px,-6px);}
  50%{transform:translate(-6px,6px);}
  75%{transform:translate(4px,-4px);}
  100%{transform:translate(0);}
}

/* MOBILE */
@media (max-width:768px){
  .phone{
    width:100vw;
    height:100dvh;
    aspect-ratio:auto;
    top:0;
    left:0;
    transform:none;
  }
}
</style>
</head>

const items = [];

const W = container.clientWidth;
const H = container.clientHeight;

/* 🔥 CREAR IMÁGENES */
images.forEach(src=>{

  const div = document.createElement("div");
  div.className = "item";

  const size = Math.random()*120 + 120;

  let x = Math.random()*(W-size);
  let y = Math.random()*(H-size);

  let vx = (Math.random()-0.5)*2;
  let vy = (Math.random()-0.5)*2;

  div.style.width = size+"px";
  div.style.height = size+"px";

  const img = document.createElement("img");
  img.src = src;

  div.appendChild(img);

  div.onclick = ()=>{
    flash.style.opacity = "1";
    setTimeout(()=> flash.style.opacity="0",60);

    document.body.classList.add("glitch");
    setTimeout(()=> document.body.classList.remove("glitch"),120);

    const random = links[Math.floor(Math.random()*links.length)];
    window.open(random,"_blank");
  };

  container.appendChild(div);

  items.push({div,x,y,vx,vy,size});
});

/* 🔥 MOVIMIENTO + COLISIONES */
function update(){

  items.forEach(a=>{

    a.x += a.vx;
    a.y += a.vy;

    /* REBOTE BORDES */
    if(a.x <= 0 || a.x + a.size >= W) a.vx *= -1;
    if(a.y <= 0 || a.y + a.size >= H) a.vy *= -1;

    /* NO ENCIMARSE */
    items.forEach(b=>{
      if(a === b) return;

      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < a.size*0.8){
        a.vx += dx*0.01;
        a.vy += dy*0.01;
      }
    });

    a.div.style.transform = `translate(${a.x}px, ${a.y}px)`;
  });

  requestAnimationFrame(update);
}

update();

/* 💀 GLITCH RANDOM SOLO */
setInterval(()=>{
  document.body.classList.add("glitch");
  setTimeout(()=>document.body.classList.remove("glitch"),150);
